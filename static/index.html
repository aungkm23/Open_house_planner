<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open House Route Planner</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="background-animation"></div>

    <main class="grid-container">
        
        <div class="controls-column">
            <header>
                <h1>Open House Planner</h1>
                <p>Optimize your viewing schedule and find the fastest route.</p>
            </header>

            <section class="planner-card glass">
                
                <div class="availability-section" style="margin-bottom: 20px;">
                    <div class="date-range-group" style="display: flex; gap: 15px;">
                        <div class="input-group flex-grow">
                            <label for="start-date">Start Date</label>
                            <input type="date" id="start-date">
                        </div>
                        <div class="input-group flex-grow">
                            <label for="end-date">End Date</label>
                            <input type="date" id="end-date">
                        </div>
                    </div>
                    
                    <div class="checkbox-group" style="margin-top: 10px; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="single-day-pref" style="width: auto;">
                        <label for="single-day-pref" style="margin-bottom: 0;">Put everything in one day?</label>
                    </div>
                </div>

                <div class="input-group">
                    <label for="current-location">Starting Location</label>
                    <input type="text" id="current-location" placeholder="e.g. CN Tower, Toronto, ON" value="CN Tower, Toronto, ON">
                </div>

                <div class="houses-section">
                    <div class="houses-header">
                        <h2>Open Houses to Visit</h2>
                        <div class="houses-actions">
                            <button id="add-link-btn" class="btn-secondary">+ Add from Link</button>
                            <button id="add-house-btn" class="btn-secondary">+ Add Property</button>
                        </div>
                    </div>
                    
                    <div id="houses-list">
                        <!-- Dynamic inputs will be inserted here -->
                    </div>
                </div>

                <button id="optimize-btn" class="btn-primary">
                    <span class="btn-text">Optimize Route</span>
                    <span class="loader hidden"></span>
                </button>
                <div id="error-message" class="error-text hidden"></div>
            </section>

            <section id="result-section" class="result-card glass hidden">
                <div class="result-header" style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <h2>Optimal Route Found <span class="badge">✨</span></h2>
                        <p id="total-time-display" class="total-time">Total Time: <span>-</span></p>
                    </div>
                    <a id="export-gmaps-btn" target="_blank" class="btn-secondary hidden" style="text-decoration: none; padding: 10px 16px;">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24" style="margin-right: 6px; vertical-align: text-bottom;"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
                        Export to Maps
                    </a>
                </div>
                
                <div class="timeline" id="route-timeline">
                    <!-- Route steps will be dynamically inserted here -->
                </div>
            </section>
        </div>

        <div class="map-column">
            <div id="map" class="glass"></div>
        </div>

    </main>

    <!-- Modal for Adding from Link -->
    <div id="link-modal" class="modal hidden">
        <div class="modal-content glass">
            <h3>Add Property from Link</h3>
            <p>Paste a link from realtor.ca or zillow.</p>
            <div class="input-group">
                <input type="text" id="property-link-input" placeholder="https://www.realtor.ca/...">
            </div>
            <div class="modal-actions">
                <button id="cancel-link-btn" class="btn-secondary">Cancel</button>
                <button id="submit-link-btn" class="btn-primary">
                    <span class="btn-text">Extract</span>
                    <span class="loader hidden"></span>
                </button>
            </div>
            <div id="link-error-message" class="error-text hidden"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/static/app.js"></script>

</body>
</html>
